version: "3.8"

services:
  mongodb:
    image: mongo:6
    container_name: crimehub-mongo
    ports:
      - "27017:27017"
    volumes:
      - crimehub-mongo-data:/data/db
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: crimehub-backend
    ports:
      - "5000:5000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017
      - JWT_SECRET=crimehub_secret_key_666_docker
      - PORT=5000
      - FRONTEND_URL=http://localhost:3000
    depends_on:
      - mongodb
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: crimehub-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:5000/api
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  crimehub-mongo-data:
